name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: offline unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - name: pytest (offline only — integration deselected by default addopts)
        run: pytest -q
