name: integration (SkyPortal via Docker)

# Spin up mainline SkyPortal using its OWN supported Docker deployment and run
# skybot's read-only integration suite against it. Secret-free: the admin token
# is self-provisioned by the app into .tokens.yaml on boot and read out of the
# container.
#
# Why Docker (not `make run`): the Dockerfile bakes the JS bundle at build time
# (`rspack --mode=production`) and runs `make run_production` — no debug webpack
# watcher, no supervisord-under-nohup. That's deterministic; bare-metal `make
# run` was not. Flow mirrors doc/deploy.md.
#
# Runs per push/PR (immediate signal on SkyPortal API drift — the main
# regression risk) plus a nightly to catch drift on no-commit days. The image
# build is heavy; `concurrency` below cancels superseded runs on the same ref so
# they don't pile up, and Docker layer caching keeps rebuilds reasonable.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * *" # nightly 07:00 UTC — catches SkyPortal main drift on no-commit days
  workflow_dispatch:
    inputs:
      skyportal_ref:
        description: "skyportal/skyportal git ref to test against"
        default: "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout skybot
        uses: actions/checkout@v4
        with:
          path: skybot

      - name: Checkout SkyPortal
        uses: actions/checkout@v4
        with:
          repository: skyportal/skyportal
          ref: ${{ inputs.skyportal_ref || 'main' }}
          submodules: recursive
          path: skyportal

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build + start SkyPortal (web + db) via docker compose
        working-directory: skyportal
        run: |
          # BuildKit for a faster, layer-cached image build.
          export DOCKER_BUILDKIT=1 COMPOSE_DOCKER_CLI_BUILD=1
          docker compose up -d --build

      - name: Wait for Postgres
        working-directory: skyportal
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T db pg_isready -U skyportal >/dev/null 2>&1; then
              echo "db ready"; break
            fi
            sleep 5
          done

      - name: Initialize database (create tables)
        working-directory: skyportal
        run: |
          # Production image does NOT auto-create tables (doc/deploy.md). Do it once.
          docker compose exec -T web bash -c \
            'source .venv/bin/activate && FLAGS="--config=config.yaml" make db_create_tables'

      - name: Wait for API health (localhost:9000 -> container :5000)
        run: |
          up=0
          for i in $(seq 1 120); do        # 10 min; run_production serves a prebuilt bundle, so this is quick
            if curl -sf http://localhost:9000/api/sysinfo > /dev/null; then
              echo "SkyPortal up after ~$((i * 5))s"; up=1; break
            fi
            sleep 5
          done
          if [ "$up" -ne 1 ]; then
            echo "::error::SkyPortal API never answered"; exit 1
          fi

      - name: Read self-provisioned admin token
        working-directory: skyportal
        run: |
          # The app writes .tokens.yaml (INITIAL_ADMIN) a few seconds after the
          # tables exist (doc/deploy.md). Poll for it inside the container.
          TOKEN=""
          for i in $(seq 1 24); do          # up to 2 min
            TOKEN=$(docker compose exec -T web sh -c \
              "awk '/INITIAL_ADMIN:/ {print \$2; exit}' .tokens.yaml" 2>/dev/null | tr -d '\r')
            [ -n "$TOKEN" ] && break
            sleep 5
          done
          if [ -z "$TOKEN" ]; then
            echo "::error::.tokens.yaml / INITIAL_ADMIN not found"; exit 1
          fi
          echo "SKYBOT_TEST_BASE=http://localhost:9000" >> "$GITHUB_ENV"
          echo "SKYBOT_TEST_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Install skybot + run integration tests (read-only)
        working-directory: skybot
        run: |
          pip install -e ".[dev]"
          pytest -m integration -q

      - name: SkyPortal logs on failure
        if: failure()
        working-directory: skyportal
        run: docker compose logs --tail 200 || true
